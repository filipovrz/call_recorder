name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - "app/**"
      - "gradle/**"
      - "*.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Sync site version.json from Gradle
        run: |
          VERSION=$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' app/build.gradle.kts | head -n1)
          echo "App versionName=$VERSION"
          printf '{\n  "version": "%s",\n  "minAndroid": "8.0",\n  "updated_at": "%s"\n}\n' \
            "$VERSION" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > deploy/public_html/version.json
          cat deploy/public_html/version.json

      - name: Stage APK for hosting folder
        run: |
          mkdir -p deploy/public_html/downloads
          cp app/build/outputs/apk/debug/*.apk deploy/public_html/downloads/evtinko-call-recorder.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: evtinko-call-recorder-debug
          path: |
            deploy/public_html/downloads/evtinko-call-recorder.apk
            deploy/public_html/version.json
          if-no-files-found: error
